name: Feature request
description: Suggest a new tool, API area, or behavior
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case should this solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: Describe the MCP tool or behavior you want.
    validations:
      required: true
  - type: input
    id: mealie-endpoint
    attributes:
      label: Related Mealie endpoint
      description: If known, paste the endpoint path from Mealie OpenAPI.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
